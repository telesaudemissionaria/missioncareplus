    <style>
        /* SEUS ESTILOS ORIGINAIS FORAM MANTIDOS */
        body {
            font-family: 'Lexend', 'Noto Sans', sans-serif;
            --primary-color: #0d9488; /* teal-600 */
            --primary-color-light: #ccfbf1; /* teal-100 */

        }
        .hidden { display: none; }
        .tab-button.active { border-bottom-color: var(--primary-color); color: var(--primary-color); font-weight: 600; }
        .lang-btn { padding: 0.25rem 0.5rem; border-radius: 9999px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .lang-btn.active { border-color: var(--primary-color); background-color: white; }

        .choice-label { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border: 2px solid #e5e7eb; border-radius: 0.75rem; cursor: pointer; transition: background-color 0.2s, border-color 0.2s; }
        .choice-label:has(input:checked) { background-color: var(--primary-color-light); border-color: var(--primary-color); }
        .choice-label span { font-size: 1.125rem; color: #374151; }
        .choice-input { height: 1.5rem; width: 1.5rem; color: var(--primary-color); border-color: #9ca3af; }
        .choice-input:focus { box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.3); }
        #orientation-content h3 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1f2937;}
        #orientation-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #4b5563;}
        #orientation-content li { margin-bottom: 0.5rem; }
        #orientation-content p { margin-bottom: 1rem; line-height: 1.6; color: #374151;}
        #orientation-content strong { font-weight: 700; }
        .offline-banner { background-color: #fee2e2; color: #991b1b; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }

    setLanguage(localStorage.getItem('language') || 'pt');
    
    // --- REFERÊNCIAS AOS ELEMENTOS DO DOM ---
    const mainActionButton = document.getElementById('main-action-button');
    const onlineModeContainer = document.getElementById('online-mode');
    const offlineModeContainer = document.getElementById('offline-mode');
    
    // Referências aos formulários e telas (mantendo suas IDs originais)
    const formScreenOnline = document.getElementById('form-screen-online');
    const formScreenOffline = document.getElementById('form-screen-offline');
    const loadingScreen = document.getElementById('loading-screen');
    const resultsScreenOnline = document.getElementById('results-screen');
    const resultsScreenOffline = document.getElementById('results-screen-offline');

    // --- SUA LÓGICA ORIGINAL PARA MODAL, API, RESULTADOS, PDF, WHATSAPP (MANTIDA) ---
    const emergencyModal = document.getElementById('emergency-alert-modal');
    if (emergencyModal && !sessionStorage.getItem('emergencyAlertClosed')) { emergencyModal.classList.remove('hidden'); }
    document.getElementById('close-emergency-alert')?.addEventListener('click', () => { /* ... */ });
    
    const backendUrl = "https://missioncare-plus-backend.onrender.com";
    const fetchWithRetry = async (url, options, retries = 3, backoff = 1000) => { /* ... sua função fetchWithRetry completa ... */ };

    // --- LÓGICA DE AÇÃO REESTRUTURADA ---

    // Função para rodar a análise ONLINE (adaptada da sua lógica original)
    const runOnlineAnalysis = async () => {
        // ... (todo o conteúdo da sua função original 'generateBtn.addEventListener') ...
        // Ex: Coletar dados do form online, validar, mostrar loading, chamar fetchWithRetry, etc.
        console.log("EXECUTANDO LÓGICA ONLINE...");
        // Exemplo:
        const problemaPrincipal = document.getElementById('problema-principal').value;
        if (!problemaPrincipal.trim()) {
            alert('Por favor, descreva o principal problema ou sintoma.');
            return;
        }
        formScreenOnline.classList.add('hidden');
        loadingScreen.classList.remove('hidden');
        // ... o resto da sua lógica de fetch ...
    };

    // Função para rodar a avaliação OFFLINE (adaptada da sua lógica original)
    const runOfflineEvaluation = () => {
        // ... (todo o conteúdo da sua função original 'generateBtnOffline.addEventListener') ...
        console.log("EXECUTANDO LÓGICA OFFLINE...");
        // Exemplo:
        const problemaPrincipal = document.getElementById('problema-principal-offline').value;
        if (!problemaPrincipal.trim()) {
            alert('Por favor, descreva o principal problema ou sintoma.');
            return;
        }
        formScreenOffline.classList.add('hidden');
        resultsScreenOffline.classList.remove('hidden'); // Exibe a tela de resultado offline
        // ... o resto da sua lógica de avaliação offline ...
    };

    // --- O "GATEKEEPER" (PORTEIRO) ---
    const handleMainButtonClick = () => {
        const isOnline = navigator.onLine;
        console.log(`Botão principal clicado. Status da conexão: ${isOnline ? 'ONLINE' : 'OFFLINE'}`);
        if (isOnline) {
            // A tela de resultados offline deve estar escondida
            if(resultsScreenOffline) resultsScreenOffline.classList.add('hidden');
            runOnlineAnalysis();
        } else {
            // A tela de resultados online deve estar escondida
            if(resultsScreenOnline) resultsScreenOnline.classList.add('hidden');
            runOfflineEvaluation();
        }
    };

    // --- CONTROLE DA INTERFACE DO USUÁRIO ---
    const updateUserInterface = () => {
        const isOnline = navigator.onLine;
        console.log(`Atualizando UI. Status: ${isOnline ? 'ONLINE' : 'OFFLINE'}`);

        const lang = localStorage.getItem('language') || 'pt';
        const onlineText = translations[lang]?.generateButton || "Gerar Análise";
        const offlineText = translations[lang]?.generateButtonOffline || "Avaliar Emergência";

        if (isOnline) {
            onlineModeContainer.classList.remove('hidden');
            offlineModeContainer.classList.add('hidden');
            mainActionButton.textContent = onlineText;
        } else {
            onlineModeContainer.classList.add('hidden');
            offlineModeContainer.classList.remove('hidden');
            mainActionButton.textContent = offlineText;
        }
        // Garante que as telas de formulário corretas apareçam ao mudar de modo
        formScreenOnline.classList.remove('hidden');
        resultsScreenOnline.classList.add('hidden');
        formScreenOffline.classList.remove('hidden');
        resultsScreenOffline.classList.add('hidden');
        loadingScreen.classList.add('hidden');
    };

    // --- INICIALIZAÇÃO E VINCULAÇÃO DE EVENTOS ---
    mainActionButton.addEventListener('click', handleMainButtonClick);
    window.addEventListener('online', updateUserInterface);
    window.addEventListener('offline', updateUserInterface);

    // Inicialização no carregamento da página
    updateUserInterface();
    // Sua lógica de sync e service worker original
    // updateSyncIndicator();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(console.error); }
});
